name: iOS CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, feat/** ]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Verify Xcode Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies -project Axis.xcodeproj

      - name: Build (Debug, iOS Simulator)
        run: |
          xcodebuild \
            -skipMacroValidation \
            -project Axis.xcodeproj \
            -scheme Axis \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -quiet build
